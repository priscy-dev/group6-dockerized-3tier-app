# Defines the services (containers) that make up the 3-tier application
services:
  # Tier 1: Frontend (Your React + Vite application)
  frontend:
    # Build the image using the Dockerfile in the current directory
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Set the container name for easier identification
    container_name: fitness_frontend
    # Map port 80 of your host machine to port 80 in the Nginx container
    ports:
      - "80:80"
    # Ensure the frontend starts after the backend is created
    # depends_on:
    #    - backend
    # # Automatically restart the container if it crashes
    restart: unless-stopped

